<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Lab | Hugo Feuilloy</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
            background: #050505;
        }
        .lab-nav {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        .lab-back {
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--font-heading);
            font-size: 0.9rem;
            border: 1px solid #333;
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .lab-back:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
        }
        .gesture-instructions {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-family: var(--font-heading);
            color: white;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .gesture-instructions p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .gesture-instructions span {
            color: var(--accent);
            font-weight: bold;
        }
        #gesture-canvas {
            opacity: 1 !important;
            z-index: 1 !important;
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    
    <nav class="lab-nav">
        <a href="../index.html" class="lab-back">&larr; Retour au portfolio</a>
    </nav>

    <div class="gesture-instructions">
        <h3 lang="fr">Expérience Gestuelle</h3>
        <h3 lang="en">Gesture Experience</h3>
        <p lang="fr">Poing serré &rarr; <span>MMI3</span></p>
        <p lang="en">Closed fist &rarr; <span>MMI3</span></p>
        <p lang="fr">Index levé &rarr; <span>HUGO</span></p>
        <p lang="en">Index up &rarr; <span>HUGO</span></p>
        <p lang="fr">Majeur levé &rarr; <span>🖕</span></p>
        <p lang="en">Middle finger up &rarr; <span>🖕</span></p>
        <p lang="fr">Index + Majeur &rarr; <span>FEUILLOY</span></p>
        <p lang="en">Index + Middle &rarr; <span>FEUILLOY</span></p>
    </div>

    <div class="hand-status">
        <span lang="fr">Contrôle gestuel actif</span>
        <span lang="en">Hand control active</span>
    </div>

    <!-- Scripts avec chemins corrigés -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="../script.js"></script>
    <script src="../gestures.js"></script>
</body>
</html>
